<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>拱猪计分器</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --surface: #111111;
  --surface2: #1a1a1a;
  --border: #2a2a2a;
  --text: #e8e0d4;
  --text-dim: #706860;
  --accent: #c8bfb4;
  --danger: #c07070;
  --success: #70a070;
  --gold: #b09060;
  --pname: #e8e0d4;
  --heart: #ef5350;
  --spade: #e0e0e0;
  --diamond: #ef5350;
  --club: #e0e0e0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

button { cursor: pointer; border: none; font-family: inherit; }
.screen { display: none; }
.screen.active { display: flex; flex-direction: column; }

/* ==================== HOME ==================== */
#home-screen {
  min-height: 100dvh;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 1.2rem;
}

.home-title { font-size: 2.5rem; font-weight: 800; color: var(--accent); }
.home-subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 0.5rem; }

.home-buttons { display: flex; flex-direction: column; gap: 0.7rem; width: 100%; max-width: 300px; }

.btn-home {
  padding: 0.85rem;
  border-radius: 12px;
  font-size: 1rem;
  font-weight: 700;
  transition: transform 0.15s;
  text-align: center;
}

.btn-home:active { transform: scale(0.96); }

.btn-home-primary {
  background: linear-gradient(135deg, #e8e0d4, #a09888);
  color: #111;
  box-shadow: 0 4px 12px rgba(232,224,212,0.12);
}

.btn-home-secondary {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}

/* ==================== JOIN ==================== */
#join-screen {
  min-height: 100dvh;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 1.2rem;
}

.join-title { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

.code-input {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 0.9rem 1.2rem;
  color: var(--text);
  font-size: 1.8rem;
  font-weight: 800;
  letter-spacing: 0.5em;
  text-align: center;
  text-transform: uppercase;
  outline: none;
  width: 220px;
  transition: border-color 0.2s;
}

.code-input:focus { border-color: var(--accent); }
.code-input::placeholder { letter-spacing: 0.2em; font-size: 1rem; color: var(--text-dim); }

.join-error { color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }

.btn-back {
  background: none;
  color: var(--text-dim);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.5rem;
  margin-top: 0.5rem;
}

/* ==================== SETUP ==================== */
#setup-screen {
  min-height: 100dvh;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  gap: 1.2rem;
}

.setup-subtitle { color: var(--text-dim); font-size: 0.85rem; }

.setup-section {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.setup-section-title {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.player-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
.player-input-group { display: flex; flex-direction: column; gap: 0.25rem; }
.player-input-group label { font-size: 0.7rem; font-weight: 700; color: var(--pname); letter-spacing: 0.04em; }

.setup-input {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.8rem;
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}

.setup-input:focus { border-color: var(--accent); }

.setup-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.8rem;
}

.setup-row-label { font-size: 0.9rem; font-weight: 600; }

.toggle-track {
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: var(--border);
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  flex-shrink: 0;
}

.toggle-track.on { background: var(--accent); }

.toggle-knob {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background: white;
  position: absolute;
  top: 2px;
  left: 2px;
  transition: left 0.2s;
}

.toggle-track.on .toggle-knob { left: 22px; }

.btn-start {
  background: linear-gradient(135deg, #e8e0d4, #a09888);
  color: #111;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 0.8rem 3rem;
  border-radius: 14px;
  transition: transform 0.15s;
  box-shadow: 0 4px 12px rgba(232,224,212,0.12);
  margin-top: 0.3rem;
}

.btn-start:active { transform: scale(0.96); }

/* ==================== GAME ==================== */
#game-screen { min-height: 100dvh; padding-bottom: 2rem; }

/* Room code bar */
.room-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.4rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--text-dim);
}

.room-code {
  font-weight: 800;
  font-size: 0.9rem;
  color: var(--accent);
  letter-spacing: 0.15em;
}

/* Scoreboard */
.scoreboard {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.score-cell {
  text-align: center;
  padding: 0.5rem 0.2rem;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 3px solid transparent;
  user-select: none;
}

.score-cell.selected { background: rgba(232,224,212,0.08); border-bottom-color: var(--accent); }

.score-cell .pname {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--pname);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.score-cell .total { font-size: 1.3rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.score-cell .preview { font-size: 0.7rem; font-variant-numeric: tabular-nums; min-height: 1em; color: var(--text-dim); }
.spos { color: var(--success) !important; }
.sneg { color: var(--danger) !important; }

.instruction {
  text-align: center;
  padding: 0.5rem 1rem;
  font-size: 0.75rem;
  color: var(--text-dim);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}

.instruction strong { color: var(--accent); }

.round-indicator {
  text-align: center;
  padding: 0.5rem;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--accent);
}

/* Cards */
.card-area { padding: 0.5rem; display: flex; flex-direction: column; gap: 0.6rem; }

.card-group-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 0 0.3rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}

.card-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }

.card-btn {
  position: relative;
  width: 50px;
  height: 68px;
  border-radius: 7px;
  background: var(--surface2);
  border: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: all 0.12s;
  user-select: none;
}

.card-btn:active { transform: scale(0.92); }
.card-btn .cs { font-size: 0.9rem; line-height: 1; }
.card-btn .cr { font-size: 1rem; font-weight: 800; line-height: 1.1; }
.card-btn .cv { font-size: 0.5rem; color: var(--text-dim); font-weight: 600; position: absolute; bottom: 2px; }
.card-btn.no-value .cv { display: none; }

.suit-h .cs, .suit-h .cr { color: var(--heart); }
.suit-s .cs, .suit-s .cr { color: var(--spade); }
.suit-d .cs, .suit-d .cr { color: var(--diamond); }
.suit-c .cs, .suit-c .cr { color: var(--club); }

.card-btn.a0 { border-color: #c07070; background: rgba(192,112,112,0.1); }
.card-btn.a1 { border-color: #7090b0; background: rgba(112,144,176,0.1); }
.card-btn.a2 { border-color: #70a070; background: rgba(112,160,112,0.1); }
.card-btn.a3 { border-color: #b09060; background: rgba(176,144,96,0.1); }

.card-btn.a0::after, .card-btn.a1::after, .card-btn.a2::after, .card-btn.a3::after {
  content: attr(data-pl);
  position: absolute;
  top: -7px;
  right: -5px;
  font-size: 0.5rem;
  font-weight: 800;
  padding: 1px 4px;
  border-radius: 5px;
  color: white;
  white-space: nowrap;
  max-width: 36px;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-btn.a0::after { background: #c07070; }
.card-btn.a1::after { background: #7090b0; }
.card-btn.a2::after { background: #70a070; }
.card-btn.a3::after { background: #b09060; }

@keyframes card-pulse {
  0% { box-shadow: 0 0 0 0 rgba(200,191,180,0.4); }
  70% { box-shadow: 0 0 0 6px rgba(200,191,180,0); }
  100% { box-shadow: 0 0 0 0 rgba(200,191,180,0); }
}

.card-btn.pulse { animation: card-pulse 0.4s ease-out; }

/* Expose */
.expose-area { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; padding: 0 0.5rem; }

.expose-btn {
  display: flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.4rem 0.7rem;
  border-radius: 7px;
  background: var(--surface2);
  border: 2px solid var(--border);
  color: var(--text-dim);
  font-size: 0.75rem;
  font-weight: 600;
  transition: all 0.12s;
  user-select: none;
}

.expose-btn.active { border-color: var(--accent); background: rgba(200,191,180,0.1); color: var(--accent); }
.expose-btn .el { font-weight: 800; font-size: 0.8rem; }

/* Badges */
.badges { display: flex; gap: 0.4rem; justify-content: center; padding: 0.3rem; flex-wrap: wrap; min-height: 1.6rem; }

.badge {
  font-size: 0.65rem;
  font-weight: 700;
  padding: 0.15rem 0.5rem;
  border-radius: 5px;
  display: none;
}

.badge.on { display: inline-block; }
.badge-qh { background: rgba(192,112,112,0.15); color: var(--danger); border: 1px solid rgba(192,112,112,0.3); }
.badge-zymq { background: rgba(176,144,96,0.15); color: var(--gold); border: 1px solid rgba(176,144,96,0.3); }

/* Actions */
.actions { display: flex; gap: 0.5rem; padding: 0.5rem 1rem; justify-content: center; flex-wrap: wrap; }

.btn-a {
  padding: 0.65rem 1.2rem;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 700;
  transition: all 0.12s;
}

.btn-a:active { transform: scale(0.96); }

.btn-confirm {
  background: linear-gradient(135deg, #e8e0d4, #a09888);
  color: #111;
  box-shadow: 0 3px 10px rgba(232,224,212,0.15);
  flex: 1;
  max-width: 180px;
}

.btn-confirm:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
.btn-secondary { background: var(--surface2); color: var(--text-dim); border: 1px solid var(--border); }

/* Chart */
.chart-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.5rem;
  position: relative;
}

.chart-container canvas { width: 100%; height: 200px; display: block; }

.chart-legend {
  display: flex;
  justify-content: center;
  gap: 0.8rem;
  padding: 0.3rem 0;
  flex-wrap: wrap;
}

.chart-legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.7rem; font-weight: 600; }
.chart-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* History */
.collapsible-section { padding: 0 1rem; margin-top: 0.5rem; }

.collapse-toggle {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 0.8rem;
  color: var(--text);
  font-size: 0.85rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.collapse-toggle .arr { transition: transform 0.2s; font-size: 0.7rem; }
.collapse-toggle.open .arr { transform: rotate(180deg); }
.collapse-body { display: none; flex-direction: column; gap: 0.3rem; margin-top: 0.4rem; }
.collapse-body.open { display: flex; }

.hist-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 0.5rem 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.3rem;
}

.hist-label { font-size: 0.75rem; font-weight: 700; color: var(--text-dim); min-width: 42px; }
.hist-scores { display: flex; flex: 1; justify-content: space-around; }
.hist-s { font-size: 0.8rem; font-weight: 700; font-variant-numeric: tabular-nums; min-width: 40px; text-align: center; }
.hist-tags { display: flex; gap: 0.2rem; }
.hist-tag { font-size: 0.55rem; font-weight: 700; padding: 1px 4px; border-radius: 3px; }
.hist-tag-qh { background: rgba(192,112,112,0.2); color: var(--danger); }
.hist-tag-zymq { background: rgba(176,144,96,0.2); color: var(--gold); }

.hist-row .btn-del {
  background: none;
  color: var(--text-dim);
  font-size: 0.85rem;
  padding: 0.1rem 0.3rem;
  border-radius: 4px;
  opacity: 0.4;
  transition: opacity 0.15s, color 0.15s;
}

.hist-row .btn-del:hover, .hist-row .btn-del:active { opacity: 1; color: var(--danger); }

/* Footer */
.footer { display: flex; justify-content: center; padding: 1rem; gap: 0.6rem; }

.btn-footer {
  background: var(--surface2);
  color: var(--text-dim);
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
}

/* Game Over Overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.overlay.open { display: flex; }

.overlay-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  max-width: 400px;
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  max-height: 90dvh;
  overflow-y: auto;
}

.overlay-title { font-size: 1.5rem; font-weight: 800; color: var(--gold); }
.overlay-standings { display: flex; flex-direction: column; gap: 0.4rem; }

.standing-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.5rem 0.8rem;
  background: var(--surface2);
  border-radius: 8px;
}

.standing-rank { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); width: 24px; }
.standing-name { font-size: 1rem; font-weight: 700; flex: 1; text-align: left; margin-left: 0.3rem; }
.standing-score { font-size: 1.1rem; font-weight: 800; font-variant-numeric: tabular-nums; }
.standing-row:first-child { border: 1px solid var(--gold); }
.standing-row:first-child .standing-rank { color: var(--gold); }

.overlay-stats { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; }

.btn-overlay {
  background: linear-gradient(135deg, #e8e0d4, #a09888);
  color: #111;
  font-size: 1rem;
  font-weight: 700;
  padding: 0.75rem 2rem;
  border-radius: 12px;
}

/* Toast */
.toast {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.6rem 1rem;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  z-index: 300;
  transition: transform 0.3s ease;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (min-width: 480px) {
  .card-btn { width: 56px; height: 74px; }
  .card-btn .cr { font-size: 1.1rem; }
}

@media (min-width: 700px) {
  .card-area, .actions, .collapsible-section, .footer {
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
}
</style>
</head>
<body>

<!-- ===== HOME ===== -->
<div id="home-screen" class="screen active">
  <div class="home-title">拱猪计分器</div>
  <div class="home-subtitle">选择游戏模式</div>
  <div class="home-buttons">
    <button class="btn-home btn-home-primary" onclick="goCreate()">创建房间</button>
    <button class="btn-home btn-home-secondary" onclick="goJoin()">加入房间</button>
    <button class="btn-home btn-home-secondary" onclick="goLocal()">单机模式</button>
  </div>
</div>

<!-- ===== JOIN ===== -->
<div id="join-screen" class="screen">
  <div class="join-title">输入房间代码</div>
  <input class="code-input" id="inp-code" type="text" maxlength="4" placeholder="XXXX" autocomplete="off">
  <div class="join-error" id="join-error"></div>
  <button class="btn-home btn-home-primary" style="width:220px" onclick="doJoin()">加入</button>
  <button class="btn-back" onclick="goHome()">← 返回</button>
</div>

<!-- ===== SETUP ===== -->
<div id="setup-screen" class="screen">
  <div class="home-title" style="font-size:1.5rem">创建游戏</div>
  <div class="setup-subtitle" id="setup-subtitle"></div>
  <div class="setup-section">
    <div class="setup-section-title">玩家名字</div>
    <div class="player-inputs">
      <div class="player-input-group"><label>玩家 1</label><input class="setup-input" id="inp-n0" placeholder="东" maxlength="6"></div>
      <div class="player-input-group"><label>玩家 2</label><input class="setup-input" id="inp-n1" placeholder="南" maxlength="6"></div>
      <div class="player-input-group"><label>玩家 3</label><input class="setup-input" id="inp-n2" placeholder="西" maxlength="6"></div>
      <div class="player-input-group"><label>玩家 4</label><input class="setup-input" id="inp-n3" placeholder="北" maxlength="6"></div>
    </div>
  </div>
  <div class="setup-section">
    <div class="setup-section-title">规则设置</div>
    <div class="setup-row">
      <span class="setup-row-label">允许明牌</span>
      <div class="toggle-track on" id="tog-ming" onclick="toggleMing()">
        <div class="toggle-knob"></div>
      </div>
    </div>
    <div class="setup-row">
      <span class="setup-row-label">结束分数</span>
      <input class="setup-input" id="inp-target" type="number" value="2000" min="100" step="100" style="width:100px;text-align:center;margin-left:auto">
    </div>
  </div>
  <button class="btn-start" onclick="doCreate()">开始</button>
  <button class="btn-back" onclick="goHome()">← 返回</button>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen">
  <div class="room-bar" id="room-bar" style="display:none">
    <span>房间</span><span class="room-code" id="room-code-display"></span>
  </div>

  <div class="scoreboard" id="scoreboard"></div>

  <div class="instruction">选中 <strong>玩家</strong>，再点 <strong>牌</strong> 进行分配</div>

  <div class="round-indicator" id="round-ind">第 1 轮</div>

  <div class="card-area">
    <div class="card-group-label"><span style="color:var(--heart)">♥</span> 红心</div>
    <div class="card-grid" id="grid-hearts"></div>
    <div class="card-group-label" style="margin-top:0.2rem">特殊牌</div>
    <div class="card-grid" id="grid-specials"></div>
    <div id="expose-section" style="margin-top:0.2rem">
      <div class="card-group-label">亮牌（明）</div>
      <div class="expose-area" id="expose-area"></div>
    </div>
  </div>

  <div class="badges">
    <span class="badge badge-qh" id="b-qh">全红！红心翻正</span>
    <span class="badge badge-zymq" id="b-zymq">猪羊满圈！</span>
  </div>

  <div class="actions">
    <button class="btn-a btn-secondary" onclick="resetRound()">清空</button>
    <button class="btn-a btn-confirm" id="btn-ok" onclick="confirmRound()" disabled>确认本轮</button>
    <button class="btn-a btn-secondary" id="btn-undo" onclick="undoLast()" style="display:none">撤销</button>
  </div>

  <div class="collapsible-section">

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue, get } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3jRHdgq96e-MW_xZDkgW38ce78gsiACk",
  authDomain: "gongzhu.firebaseapp.com",
  databaseURL: "https://gongzhu-default-rtdb.firebaseio.com",
  projectId: "gongzhu",
  storageBucket: "gongzhu.firebasestorage.app",
  messagingSenderId: "420229380870",
  appId: "1:420229380870:web:b3a006205941124f5e3c87",
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

const P_COLORS = ['#c07070','#7090b0','#70a070','#b09060'];
const DEFAULTS = ['东','南','西','北'];
const UNASSIGNED = -1;

const HEARTS = [
  {id:'hA',  rank:'A',  val:-50},
  {id:'hK',  rank:'K',  val:-40},
  {id:'hQ',  rank:'Q',  val:-30},
  {id:'hJ',  rank:'J',  val:-20},
  {id:'h10', rank:'10', val:-10},
  {id:'h9',  rank:'9',  val:-10},
  {id:'h8',  rank:'8',  val:-10},
  {id:'h7',  rank:'7',  val:-10},
  {id:'h6',  rank:'6',  val:-10},
  {id:'h5',  rank:'5',  val:-10},
  {id:'h4',  rank:'4',  val:0},
  {id:'h3',  rank:'3',  val:0},
  {id:'h2',  rank:'2',  val:0},
];

const SPECIALS = [
  {id:'sQ',  suit:'♠', rank:'Q',  suitCls:'suit-s', baseVal:-100},
  {id:'dJ',  suit:'♦', rank:'J',  suitCls:'suit-d', baseVal:+100},
  {id:'c10', suit:'♣', rank:'10', suitCls:'suit-c', baseVal:0},
];

const EXPOSE_DEF = [
  {id:'hA',  label:'♥A'},
  {id:'sQ',  label:'♠Q 猪'},
  {id:'dJ',  label:'♦J 羊'},
  {id:'c10', label:'♣10 变压器'},
];

const ALL_IDS = HEARTS.map(c=>c.id).concat(SPECIALS.map(c=>c.id));

let G = {};
let roomCode = null;
let roomRef = null;
let listener = null;
let isOnline = false;
let selPlayer = 0;

function freshState(players, ming, target) {
  const assign = {};
  ALL_IDS.forEach(id => assign[id] = UNASSIGNED);
  const exposed = {};
  EXPOSE_DEF.forEach(e => exposed[e.id] = false);
  return {
    players: players,
    mingEnabled: ming,
    targetScore: target,
    totals: [0,0,0,0],
    pigCounts: [0,0,0,0],
    sheepCounts: [0,0,0,0],
    transCounts: [0,0,0,0],
    rounds: [],
    roundNum: 1,
    gameOver: false,
    currentRound: { assign, exposed },
  };
}

function blankRound() {
  const assign = {};
  ALL_IDS.forEach(id => assign[id] = UNASSIGNED);
  const exposed = {};
  EXPOSE_DEF.forEach(e => exposed[e.id] = false);
  return { assign, exposed };
}

function a(id) { return G.currentRound.assign[id]; }
function aVal(id) { const v = G.currentRound.assign[id]; return v === UNASSIGNED ? null : v; }
function isAssigned(id) { return G.currentRound.assign[id] !== UNASSIGNED; }

/* ========== Firebase Helpers ========== */
function fbWrite(path, value) {
  if (isOnline && roomCode) set(ref(db, `rooms/${roomCode}/${path}`), value);
}

function fbWriteRoot(data) {
  if (isOnline && roomCode) set(ref(db, `rooms/${roomCode}`), data);
}

function fbUpdateRoot(updates) {
  if (isOnline && roomCode) update(ref(db, `rooms/${roomCode}`), updates);
}

function startListening() {
  if (listener) listener();
  roomRef = ref(db, `rooms/${roomCode}`);
  listener = onValue(roomRef, (snap) => {
    const data = snap.val();
    if (!data) return;
    loadFromData(data);
    refreshAll();
    renderHist();
  });
}

function stopListening() {
  if (listener) listener();
  listener = null;
  roomRef = null;
}

function loadFromData(data) {
  G.players = data.players || DEFAULTS;
  G.mingEnabled = data.mingEnabled ?? true;
  G.targetScore = data.targetScore ?? 2000;
  G.totals = toArr4(data.totals);
  G.pigCounts = toArr4(data.pigCounts);
  G.sheepCounts = toArr4(data.sheepCounts);
  G.transCounts = toArr4(data.transCounts);
  G.rounds = data.rounds ? (Array.isArray(data.rounds) ? data.rounds : Object.values(data.rounds)) : [];
  G.roundNum = data.roundNum || G.rounds.length + 1;
  G.gameOver = data.gameOver || false;

  if (data.currentRound) {
    G.currentRound = {
      assign: {},
      exposed: {},
    };
    ALL_IDS.forEach(id => {
      G.currentRound.assign[id] = data.currentRound.assign && data.currentRound.assign[id] !== undefined
        ? data.currentRound.assign[id] : UNASSIGNED;
    });
    EXPOSE_DEF.forEach(e => {
      G.currentRound.exposed[e.id] = data.currentRound.exposed ? !!data.currentRound.exposed[e.id] : false;
    });
  } else {
    G.currentRound = blankRound();
  }
}

function toArr4(v) {
  if (Array.isArray(v) && v.length === 4) return v;
  if (v && typeof v === 'object') { const a = [0,0,0,0]; for (let i=0;i<4;i++) a[i]=v[i]||0; return a; }
  return [0,0,0,0];
}

function genCode() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let code = '';
  for (let i = 0; i < 4; i++) code += c[Math.floor(Math.random() * c.length)];
  return code;
}

/* ========== Navigation ========== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { showScreen('home-screen'); }

function goCreate() {
  document.getElementById('setup-subtitle').textContent = '';
  showScreen('setup-screen');
}

function goJoin() {
  document.getElementById('inp-code').value = '';
  document.getElementById('join-error').textContent = '';
  showScreen('join-screen');
  document.getElementById('inp-code').focus();
}

function goLocal() {
  isOnline = false;
  roomCode = null;
  document.getElementById('setup-subtitle').textContent = '单机模式';
  showScreen('setup-screen');
}

/* ========== Setup & Room Management ========== */
function toggleMing() {
  const el = document.getElementById('tog-ming');
  const on = !el.classList.contains('on');
  el.classList.toggle('on', on);
  document.getElementById('inp-target').value = on ? 2000 : 1000;
}

function readSetup() {
  const players = [0,1,2,3].map(i => document.getElementById(`inp-n${i}`).value.trim() || DEFAULTS[i]);
  const ming = document.getElementById('tog-ming').classList.contains('on');
  const target = Math.abs(parseInt(document.getElementById('inp-target').value)) || 1000;
  return { players, ming, target };
}

async function doCreate() {
  const { players, ming, target } = readSetup();
  G = freshState(players, ming, target);
  selPlayer = 0;

  const wantOnline = document.getElementById('setup-subtitle').textContent !== '单机模式';

  if (wantOnline) {
    try {
      isOnline = true;
      roomCode = genCode();
      const existing = await get(ref(db, `rooms/${roomCode}`));
      if (existing.exists()) roomCode = genCode();
      await set(ref(db, `rooms/${roomCode}`), G);
      startListening();
      localStorage.setItem('gongzhu-room', roomCode);
    } catch (e) {
      console.error('Firebase error:', e);
      toast('连接失败，已切换到单机模式');
      isOnline = false;
      roomCode = null;
    }
  } else {
    isOnline = false;
    roomCode = null;
    localStorage.removeItem('gongzhu-room');
  }

  enterGame();
}

async function doJoin() {
  const code = document.getElementById('inp-code').value.trim().toUpperCase();
  if (code.length !== 4) {
    document.getElementById('join-error').textContent = '请输入4位房间代码';
    return;
  }

  try {
    const snap = await get(ref(db, `rooms/${code}`));
    if (!snap.exists()) {
      document.getElementById('join-error').textContent = '房间不存在';
      return;
    }

    roomCode = code;
    isOnline = true;
    loadFromData(snap.val());
    selPlayer = 0;
    startListening();
    localStorage.setItem('gongzhu-room', roomCode);
    enterGame();
  } catch (e) {
    console.error('Firebase error:', e);
    document.getElementById('join-error').textContent = '连接失败，请重试';
  }
}

function enterGame() {
  showScreen('game-screen');
  const bar = document.getElementById('room-bar');
  if (isOnline) {
    bar.style.display = '';
    document.getElementById('room-code-display').textContent = roomCode;
  } else {
    bar.style.display = 'none';
  }
  buildScoreboard();
  buildCards();
  buildExpose();
  renderHist();
  refreshAll();
}

function leaveGame() {
  if (G.rounds && G.rounds.length > 0 && !confirm('确定离开？')) return;
  stopListening();
  isOnline = false;
  roomCode = null;
  localStorage.removeItem('gongzhu-room');
  goHome();
}

/* ========== Build UI ========== */
function buildScoreboard() {
  document.getElementById('scoreboard').innerHTML = G.players.map((n,i) =>
    `<div class="score-cell${i===0?' selected':''}" data-p="${i}" onclick="window._selP(${i})">
      <div class="pname">${esc(n)}</div>
      <div class="total" id="tot-${i}">0</div>
      <div class="preview" id="pre-${i}"></div>
    </div>`
  ).join('');
}

function buildCards() {
  document.getElementById('grid-hearts').innerHTML = HEARTS.map(c =>
    `<button class="card-btn suit-h${c.val===0?' no-value':''}" data-c="${c.id}" onclick="window._tap('${c.id}')">
      <span class="cs">♥</span><span class="cr">${c.rank}</span><span class="cv">${c.val}</span>
    </button>`
  ).join('');

  document.getElementById('grid-specials').innerHTML = SPECIALS.map(c =>
    `<button class="card-btn ${c.suitCls}" data-c="${c.id}" onclick="window._tap('${c.id}')">
      <span class="cs">${c.suit}</span><span class="cr">${c.rank}</span>
      <span class="cv">${c.id==='c10'?'×2':((c.baseVal>0?'+':'')+c.baseVal)}</span>
    </button>`
  ).join('');
}

function buildExpose() {
  const sec = document.getElementById('expose-section');
  if (!G.mingEnabled) { sec.style.display = 'none'; return; }
  sec.style.display = '';
  document.getElementById('expose-area').innerHTML = EXPOSE_DEF.map(e =>
    `<button class="expose-btn" data-e="${e.id}" onclick="window._togExp('${e.id}')">
      <span class="el">明</span> ${e.label}
    </button>`
  ).join('');
}

/* ========== Interactions ========== */
function _selP(i) {
  selPlayer = i;
  document.querySelectorAll('.score-cell').forEach((el,j) => el.classList.toggle('selected', j===i));
}

function _tap(id) {
  const cur = G.currentRound.assign[id];
  const newVal = cur === selPlayer ? UNASSIGNED : selPlayer;
  G.currentRound.assign[id] = newVal;
  fbWrite(`currentRound/assign/${id}`, newVal);
  refreshAll();
}

function _togExp(id) {
  const newVal = !G.currentRound.exposed[id];
  G.currentRound.exposed[id] = newVal;
  fbWrite(`currentRound/exposed/${id}`, newVal);
  refreshAll();
}

/* ========== Scoring Engine ========== */
function calcScores(assign, exposed) {
  const scores = [0,0,0,0];
  const get = id => assign[id] === UNASSIGNED ? null : assign[id];

  const heartIds = HEARTS.map(c => c.id);
  const allAssignedAll = ALL_IDS.every(id => get(id) !== null);
  const onePlayerAll = allAssignedAll && new Set(ALL_IDS.map(id => get(id))).size === 1;
  const heartsAssigned = heartIds.filter(id => get(id) !== null);
  const allHearts = heartsAssigned.length === HEARTS.length;
  const onePlayerHearts = allHearts && new Set(heartsAssigned.map(id => get(id))).size === 1;

  const heartMult = exposed.hA ? 2 : 1;
  const pigMult = exposed.sQ ? 2 : 1;
  const sheepMult = exposed.dJ ? 2 : 1;
  const transMult = exposed.c10 ? 4 : 2;

  if (onePlayerAll) {
    const p = get(ALL_IDS[0]);
    let negSum = 0;
    for (const c of HEARTS) { if (c.val < 0) negSum += c.val * heartMult; }
    negSum += -100 * pigMult;
    const flipped = -negSum;
    const withSheep = flipped + 100 * sheepMult;
    scores[p] = withSheep * transMult;
    return scores;
  }

  const isQH = onePlayerHearts;
  for (const c of HEARTS) {
    const p = get(c.id);
    if (p === null) continue;
    let v = c.val * heartMult;
    if (isQH) v = -v;
    scores[p] += v;
  }

  const pigP = get('sQ');
  if (pigP !== null) scores[pigP] += -100 * pigMult;

  const sheepP = get('dJ');
  if (sheepP !== null) scores[sheepP] += 100 * sheepMult;

  const transP = get('c10');
  if (transP !== null) {
    const hasOther = ALL_IDS.some(id => id !== 'c10' && get(id) === transP);
    if (!hasOther) {
      scores[transP] = 50 * (exposed.c10 ? 2 : 1);
    } else {
      scores[transP] *= transMult;
    }
  }

  return scores;
}

function detectOutcome(assign) {
  const get = id => assign[id] === UNASSIGNED ? null : assign[id];
  const allAssignedAll = ALL_IDS.every(id => get(id) !== null);
  if (allAssignedAll && new Set(ALL_IDS.map(id => get(id))).size === 1) return 'zymq';

  const heartIds = HEARTS.map(c => c.id);
  const ha = heartIds.filter(id => get(id) !== null);
  if (ha.length === HEARTS.length && new Set(ha.map(id => get(id))).size === 1) return 'qh';

  return null;
}

/* ========== Refresh UI ========== */
function refreshAll() {
  const assign = G.currentRound.assign;
  const exposed = G.currentRound.exposed;
  const scores = calcScores(assign, exposed);
  const anyAssigned = ALL_IDS.some(id => assign[id] !== UNASSIGNED);
  const allAssigned = ALL_IDS.every(id => assign[id] !== UNASSIGNED);

  for (let i = 0; i < 4; i++) {
    const tEl = document.getElementById(`tot-${i}`);
    const pEl = document.getElementById(`pre-${i}`);
    if (!tEl) continue;
    tEl.textContent = G.totals[i];
    tEl.className = 'total' + sc(G.totals[i]);

    if (anyAssigned) {
      pEl.textContent = (scores[i]>0?'+':'') + scores[i];
      pEl.className = 'preview' + sc(scores[i]);
    } else {
      pEl.textContent = '';
      pEl.className = 'preview';
    }
  }

  document.querySelectorAll('.card-btn').forEach(el => {
    const id = el.dataset.c;
    const p = assign[id];
    el.classList.remove('a0','a1','a2','a3');
    if (p !== UNASSIGNED && p !== undefined) {
      el.classList.add('a'+p);
      el.dataset.pl = G.players[p];
    } else {
      el.dataset.pl = '';
    }
  });

  if (G.mingEnabled) {
    document.querySelectorAll('.expose-btn').forEach(el => {
      el.classList.toggle('active', !!exposed[el.dataset.e]);
    });
  }

  const outcome = detectOutcome(assign);
  document.getElementById('b-qh').classList.toggle('on', outcome === 'qh');
  document.getElementById('b-zymq').classList.toggle('on', outcome === 'zymq');
  document.getElementById('round-ind').textContent = `第 ${G.roundNum} 轮`;
  document.getElementById('btn-undo').style.display = G.rounds.length > 0 ? '' : 'none';

  const btnOk = document.getElementById('btn-ok');
  btnOk.disabled = !allAssigned;

  if (G.gameOver && !document.getElementById('gameover-overlay').classList.contains('open')) {
    showGameOver();
  }
}

/* ========== Round Management ========== */
function confirmRound() {
  if (G.gameOver) return;
  const allAssigned = ALL_IDS.every(id => G.currentRound.assign[id] !== UNASSIGNED);
  if (!allAssigned) { toast('请分配所有牌'); return; }

  const scores = calcScores(G.currentRound.assign, G.currentRound.exposed);
  const outcome = detectOutcome(G.currentRound.assign);

  const newPig = [...G.pigCounts];
  const newSheep = [...G.sheepCounts];
  const newTrans = [...G.transCounts];
  const sQ = aVal('sQ'), dJ = aVal('dJ'), c10 = aVal('c10');
  if (sQ !== null) newPig[sQ]++;
  if (dJ !== null) newSheep[dJ]++;
  if (c10 !== null) newTrans[c10]++;

  const newTotals = G.totals.map((t, i) => t + scores[i]);
  const newRounds = [...G.rounds, {
    assign: {...G.currentRound.assign},
    exposed: {...G.currentRound.exposed},
    scores: [...scores],
    outcome,
  }];

  const updates = {
    totals: newTotals,
    pigCounts: newPig,
    sheepCounts: newSheep,
    transCounts: newTrans,
    rounds: newRounds,
    roundNum: G.roundNum + 1,
    gameOver: newTotals.some(t => t <= -G.targetScore),
    currentRound: blankRound(),
  };

  if (isOnline) {
    fbUpdateRoot(updates);
  } else {
    Object.assign(G, updates);
    saveLocal();
    refreshAll();
    renderHist();
  }

  toast('本轮计分完成');
}

function resetRound() {
  G.currentRound = blankRound();
  if (isOnline) {
    fbWrite('currentRound', G.currentRound);
  }
  refreshAll();
}

function undoLast() {
  if (G.rounds.length === 0) return;
  const last = G.rounds[G.rounds.length - 1];
  const newRounds = G.rounds.slice(0, -1);
  const newTotals = G.totals.map((t, i) => t - last.scores[i]);
  const newPig = [...G.pigCounts];
  const newSheep = [...G.sheepCounts];
  const newTrans = [...G.transCounts];
  const getSafe = (a, id) => a[id] === UNASSIGNED ? null : a[id];
  const sQ = getSafe(last.assign, 'sQ'), dJ = getSafe(last.assign, 'dJ'), c10 = getSafe(last.assign, 'c10');
  if (sQ !== null) newPig[sQ]--;
  if (dJ !== null) newSheep[dJ]--;
  if (c10 !== null) newTrans[c10]--;

  const updates = {
    totals: newTotals,
    pigCounts: newPig,
    sheepCounts: newSheep,
    transCounts: newTrans,
    rounds: newRounds.length > 0 ? newRounds : [],
    roundNum: (G.roundNum || 2) - 1,
    gameOver: false,
    currentRound: blankRound(),
  };

  if (isOnline) {
    fbUpdateRoot(updates);
  } else {
    Object.assign(G, updates);
    saveLocal();
    refreshAll();
    renderHist();
  }

  toast('已撤销');
}

function deleteRound(idx) {
  if (!confirm(`删除第 ${idx+1} 轮？`)) return;

  const newRounds = G.rounds.filter((_, i) => i !== idx);
  const newTotals = [0,0,0,0];
  const newPig = [0,0,0,0];
  const newSheep = [0,0,0,0];
  const newTrans = [0,0,0,0];

  for (const r of newRounds) {
    for (let i = 0; i < 4; i++) newTotals[i] += r.scores[i];
    const getSafe = (a, id) => a[id] === UNASSIGNED ? null : a[id];
    const sQ = getSafe(r.assign, 'sQ'), dJ = getSafe(r.assign, 'dJ'), c10 = getSafe(r.assign, 'c10');
    if (sQ !== null) newPig[sQ]++;
    if (dJ !== null) newSheep[dJ]++;
    if (c10 !== null) newTrans[c10]++;
  }

  const updates = {
    totals: newTotals,
    pigCounts: newPig,
    sheepCounts: newSheep,
    transCounts: newTrans,
    rounds: newRounds.length > 0 ? newRounds : [],
    roundNum: newRounds.length + 1,
    gameOver: newTotals.some(t => t <= -G.targetScore),
  };

  if (isOnline) {
    fbUpdateRoot(updates);
  } else {
    Object.assign(G, updates);
    saveLocal();
    refreshAll();
    renderHist();
  }

  toast(`已删除第 ${idx+1} 轮`);
}

/* ========== Chart ========== */
function drawChart() {
  if (G.rounds.length === 0) return;
  const canvas = document.getElementById('chart-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width - 16;
  const h = 200;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h);

  const data = [0,1,2,3].map(() => [0]);
  for (const r of G.rounds) {
    for (let i = 0; i < 4; i++) data[i].push(data[i][data[i].length-1] + r.scores[i]);
  }

  const allVals = data.flat();
  let minV = Math.min(...allVals, 0);
  let maxV = Math.max(...allVals, 0);
  if (minV === maxV) { minV -= 100; maxV += 100; }
  const pad = {t:15, b:25, l:45, r:10};
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = data[0].length;

  const x = i => pad.l + (n>1 ? i/(n-1) : 0.5) * cw;
  const y = v => pad.t + (1 - (v - minV) / (maxV - minV)) * ch;

  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  const steps = 4;
  ctx.font = '10px sans-serif';
  ctx.fillStyle = '#706860';
  ctx.textAlign = 'right';
  for (let s = 0; s <= steps; s++) {
    const v = minV + (maxV - minV) * s / steps;
    const yy = y(v);
    ctx.beginPath(); ctx.moveTo(pad.l, yy); ctx.lineTo(w - pad.r, yy); ctx.stroke();
    ctx.fillText(Math.round(v), pad.l - 5, yy + 3);
  }

  if (minV < 0 && maxV > 0) {
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(pad.l, y(0)); ctx.lineTo(w - pad.r, y(0)); ctx.stroke();
  }

  ctx.strokeStyle = 'rgba(192,112,112,0.35)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  const ty = y(-G.targetScore);
  if (ty >= pad.t && ty <= h - pad.b) {
    ctx.beginPath(); ctx.moveTo(pad.l, ty); ctx.lineTo(w - pad.r, ty); ctx.stroke();
    ctx.fillStyle = 'rgba(192,112,112,0.6)';
    ctx.textAlign = 'left';
    ctx.fillText(`-${G.targetScore}`, pad.l + 2, ty - 4);
  }
  ctx.setLineDash([]);

  ctx.fillStyle = '#706860';
  ctx.textAlign = 'center';
  ctx.font = '9px sans-serif';
  for (let i = 0; i < n; i++) {
    if (n <= 20 || i % Math.ceil(n/10) === 0 || i === n-1) {
      ctx.fillText(i === 0 ? '0' : i, x(i), h - pad.b + 14);
    }
  }

  for (let p = 0; p < 4; p++) {
    ctx.strokeStyle = P_COLORS[p];
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    for (let i = 0; i < n; i++) {
      const px = x(i), py = y(data[p][i]);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    if (n > 1) {
      ctx.fillStyle = P_COLORS[p];
      ctx.beginPath();
      ctx.arc(x(n-1), y(data[p][n-1]), 3.5, 0, Math.PI*2);
      ctx.fill();
    }
  }

  document.getElementById('chart-legend').innerHTML = G.players.map((nm,i) =>
    `<div class="chart-legend-item"><div class="chart-legend-dot" style="background:${P_COLORS[i]}"></div>${esc(nm)}</div>`
  ).join('');
}

window.addEventListener('resize', () => {
  if (G.rounds && G.rounds.length > 0 && document.getElementById('gameover-overlay').classList.contains('open')) drawChart();
});

/* ========== History ========== */
function renderHist() {
  const body = document.getElementById('hist-body');
  if (!G.rounds || G.rounds.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-dim);font-size:0.8rem;padding:0.4rem">暂无记录</div>';
    return;
  }
  body.innerHTML = G.rounds.map((r, idx) => {
    let tags = '';
    if (r.outcome === 'qh') tags += '<span class="hist-tag hist-tag-qh">全红</span>';
    if (r.outcome === 'zymq') tags += '<span class="hist-tag hist-tag-zymq">猪羊满圈</span>';
    return `<div class="hist-row">
      <span class="hist-label">第${idx+1}轮</span>
      <div class="hist-scores">${r.scores.map((s) =>
        `<span class="hist-s${sc(s)}">${s>0?'+':''}${s}</span>`
      ).join('')}</div>
      <div class="hist-tags">${tags}</div>
      <button class="btn-del" onclick="window._delRound(${idx})">✕</button>
    </div>`;
  }).join('');
}

function toggleHist() {
  document.getElementById('hist-tog').classList.toggle('open');
  document.getElementById('hist-body').classList.toggle('open');
}

/* ========== Game Over ========== */
function showGameOver() {
  const sorted = [0,1,2,3].sort((a,b) => G.totals[b] - G.totals[a]);
  document.getElementById('go-standings').innerHTML = sorted.map((p,i) =>
    `<div class="standing-row">
      <span class="standing-rank">#${i+1}</span>
      <span class="standing-name">${esc(G.players[p])}</span>
      <span class="standing-score${sc(G.totals[p])}">${G.totals[p]}</span>
    </div>`
  ).join('');

  const maxPig = Math.max(...G.pigCounts);
  const pigKings = G.pigCounts.map((c,i) => c === maxPig && maxPig > 0 ? G.players[i] : null).filter(Boolean);
  const maxSheep = Math.max(...G.sheepCounts);
  const sheepKings = G.sheepCounts.map((c,i) => c === maxSheep && maxSheep > 0 ? G.players[i] : null).filter(Boolean);
  const maxTrans = Math.max(...G.transCounts);
  const transKings = G.transCounts.map((c,i) => c === maxTrans && maxTrans > 0 ? G.players[i] : null).filter(Boolean);
  let statsHtml = `<div>共 ${G.rounds.length} 轮</div>`;
  if (pigKings.length > 0) statsHtml += `<div>获得猪最多：${pigKings.join('、')}（${maxPig}次）</div>`;
  if (sheepKings.length > 0) statsHtml += `<div>获得羊最多：${sheepKings.join('、')}（${maxSheep}次）</div>`;
  if (transKings.length > 0) statsHtml += `<div>获得变压器最多：${transKings.join('、')}（${maxTrans}次）</div>`;
  document.getElementById('go-stats').innerHTML = statsHtml;
  document.getElementById('gameover-overlay').classList.add('open');
  setTimeout(() => drawChart(), 100);
}

function closeGameOver() {
  document.getElementById('gameover-overlay').classList.remove('open');
}

/* ========== Local Persistence (offline mode) ========== */
function saveLocal() {
  if (isOnline) return;
  localStorage.setItem('gongzhu-local', JSON.stringify(G));
}

function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem('gongzhu-local'));
    if (!d || !d.players || d.players.length !== 4) return false;
    loadFromData(d);
    return true;
  } catch { return false; }
}

/* ========== Helpers ========== */
function sc(v) { return v > 0 ? ' spos' : v < 0 ? ' sneg' : ''; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ========== Expose to window ========== */
window.goCreate = goCreate;
window.goJoin = goJoin;
window.goLocal = goLocal;
window.goHome = goHome;
window.doCreate = doCreate;
window.doJoin = doJoin;
window.toggleMing = toggleMing;
window._selP = _selP;
window._tap = _tap;
window._togExp = _togExp;
window.confirmRound = confirmRound;
window.resetRound = resetRound;
window.undoLast = undoLast;
window._delRound = deleteRound;
window.toggleHist = toggleHist;
window.closeGameOver = closeGameOver;
window.leaveGame = leaveGame;

/* ========== Init ========== */
async function init() {
  const savedRoom = localStorage.getItem('gongzhu-room');
  if (savedRoom) {
    try {
      const snap = await get(ref(db, `rooms/${savedRoom}`));
      if (snap.exists()) {
        roomCode = savedRoom;
        isOnline = true;
        loadFromData(snap.val());
        selPlayer = 0;
        startListening();
        enterGame();
        return;
      }
    } catch (e) {
      console.warn('Failed to reconnect to room:', e);
    }
    localStorage.removeItem('gongzhu-room');
  }

  goHome();
}

init();
</script>
